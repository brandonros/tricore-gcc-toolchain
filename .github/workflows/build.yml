name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: nix build + push to cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Pulls cached paths before building and pushes everything built during
      # this job to the cache afterwards (needs the CACHIX_AUTH_TOKEN secret).
      - uses: cachix/cachix-action@v15
        with:
          name: brandonros
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build the toolchain
        run: nix build -L

      - name: Smoke test
        run: |
          echo 'int add(int a, int b){ return a + b; }' > /tmp/t.c
          ./result/bin/tricore-elf-gcc -O2 -c /tmp/t.c -o /tmp/t.o
          ./result/bin/tricore-elf-objdump -d /tmp/t.o
          file /tmp/t.o | grep -i tricore
